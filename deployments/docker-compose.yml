# deployments/docker-compose.yml
# Hanfledge 本地开发环境
# Usage: docker-compose -f deployments/docker-compose.yml up -d
#
# 密码通过环境变量注入，参考 deployments/.env.example

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hanfledge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hanfledge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hanfledge_secret}
      POSTGRES_DB: ${POSTGRES_DB:-hanfledge}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hanfledge}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  neo4j:
    image: neo4j:5-community
    container_name: hanfledge-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j_secret}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "${NEO4J_HTTP_PORT:-7475}:7474" # Web UI
      - "${NEO4J_BOLT_PORT:-7688}:7687" # Bolt protocol
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    container_name: hanfledge-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6381}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # WeKnora Knowledge Base Service (optional)
  # Enable by setting WEKNORA_ENABLED=true in .env
  weknora:
    image: wechatopenai/weknora-app:latest
    container_name: hanfledge-weknora
    restart: unless-stopped
    ports:
      - "${WEKNORA_PORT:-9380}:9380"
    environment:
      - WEKNORA_DB_HOST=postgres
      - WEKNORA_DB_PORT=5432
      - WEKNORA_DB_USER=${POSTGRES_USER:-hanfledge}
      - WEKNORA_DB_PASSWORD=${POSTGRES_PASSWORD:-hanfledge_secret}
      - DB_DRIVER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-hanfledge}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-hanfledge_secret}
      - DB_NAME=${WEKNORA_DB_NAME:-weknora}
      - REDIS_ADDR=redis:6379
      - STORAGE_TYPE=local
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - DOCREADER_ADDR=docreader:50051
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - weknora_data:/data
    profiles:
      - weknora # Only start when explicitly requested: docker-compose --profile weknora up
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  docreader:
    image: wechatopenai/weknora-docreader:latest
    container_name: hanfledge-weknora-docreader
    restart: unless-stopped
    ports:
      - "${WEKNORA_DOCREADER_PORT:-50051}:50051"
    profiles:
      - weknora
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

volumes:
  pgdata:
  neo4jdata:
  redisdata:
  weknora_data:
