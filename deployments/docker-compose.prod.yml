# deployments/docker-compose.prod.yml
# Hanfledge 全栈生产部署
# Usage: docker-compose -f deployments/docker-compose.prod.yml up -d
#
# Prerequisites:
#   docker build -f Dockerfile.backend  -t hanfledge-backend  .
#   docker build -f Dockerfile.frontend -t hanfledge-frontend ./frontend
#
# Environment variables: copy .env.example → .env and update values.

services:

  # -- Reverse Proxy ------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: hanfledge-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped

  # -- Go Backend ---------------------------------------------------
  backend:
    image: hanfledge-backend
    container_name: hanfledge-backend
    environment:
      SERVER_PORT: "8080"
      GIN_MODE: release
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-hanfledge}
      DB_PASSWORD: ${DB_PASSWORD:-hanfledge_secret}
      DB_NAME: ${DB_NAME:-hanfledge}
      DB_SSLMODE: disable
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_secret}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  # -- Next.js Frontend ---------------------------------------------
  frontend:
    image: hanfledge-frontend
    container_name: hanfledge-frontend
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    restart: unless-stopped

  # -- PostgreSQL (pgvector) ----------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hanfledge-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-hanfledge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hanfledge_secret}
      POSTGRES_DB: ${DB_NAME:-hanfledge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hanfledge}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # -- Neo4j --------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: hanfledge-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_secret}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4jdata:/data
    restart: unless-stopped

  # -- Redis --------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: hanfledge-redis
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  neo4jdata:
  redisdata:
